# Production override — apply ON TOP of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# This file:
#  - removes the dev source bind mounts so containers run their built code
#  - drops --reload from uvicorn
#  - replaces the dev Vite server with an nginx-served production bundle
#  - removes the standalone nginx service (the frontend image now serves nginx)
#  - binds only frontend (8088) and backend (8089) to the host; db/redis are
#    internal-only — no host port mapping at all
#  - parameterises secrets via .env.prod
#  - uses unique container names so they can't collide with other apps on the VM
#  - adds restart: always and basic resource limits

services:
  db:
    container_name: epp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Drop the host port binding entirely — db is reachable only inside the
    # compose network, never from the public internet.
    ports: !reset []

  redis:
    container_name: epp_redis
    restart: always
    ports: !reset []

  backend:
    container_name: epp_backend
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    # The dev compose has `env_file: - .env` which compose tries to read even
    # when the value is supplied via `--env-file`. Override to empty list so
    # only the explicit `environment:` block below is used.
    env_file: !override []
    # Override the dev source bind mount so the container runs the COPYed code.
    # The uploads volume is kept so user uploads survive recreation.
    volumes: !override
      - epp_uploads:/app/uploads
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - SMTP_TLS=${SMTP_TLS:-true}
      - UPLOAD_DIR=${UPLOAD_DIR:-./uploads}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-20}
      - ALLOWED_FILE_TYPES=${ALLOWED_FILE_TYPES}
      - APP_NAME=${APP_NAME}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - FRONTEND_URL=${FRONTEND_URL}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
      - SUPERADMIN_NAME=${SUPERADMIN_NAME}
      - ACTIVATION_TOKEN_EXPIRE_HOURS=${ACTIVATION_TOKEN_EXPIRE_HOURS:-72}
      - PASSWORD_RESET_TOKEN_EXPIRE_HOURS=${PASSWORD_RESET_TOKEN_EXPIRE_HOURS:-1}
      - LOGIN_MAX_ATTEMPTS=${LOGIN_MAX_ATTEMPTS:-5}
      - LOGIN_LOCKOUT_MINUTES=${LOGIN_LOCKOUT_MINUTES:-30}
      - SESSION_TIMEOUT_HOURS=${SESSION_TIMEOUT_HOURS:-8}
      - AI_ENABLED=${AI_ENABLED:-false}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - GROQ_MODEL_DEFAULT=${GROQ_MODEL_DEFAULT:-llama-3.3-70b-versatile}
      - GROQ_MODEL_FAST=${GROQ_MODEL_FAST:-llama-3.1-8b-instant}
      - GROQ_TIMEOUT_SECONDS=${GROQ_TIMEOUT_SECONDS:-20}
      - AI_SCORE_CACHE_SECONDS=${AI_SCORE_CACHE_SECONDS:-86400}
    ports:
      - "127.0.0.1:8089:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.core.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  frontend:
    container_name: epp_frontend
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api/v1
    # Drop the dev volume mount and node_modules anonymous volume — the
    # production image is self-contained.
    volumes: !override []
    ports:
      - "0.0.0.0:8088:80"
    depends_on:
      - backend

  # The standalone nginx service from docker-compose.yml is unused in prod
  # because the frontend image already runs nginx with /api -> backend.
  # We disable it by giving it a noop command and not exposing any ports.
  nginx:
    profiles: ["disabled"]

volumes:
  postgres_data:
    name: epp_postgres_data
  redis_data:
    name: epp_redis_data
  upload_data:
    name: epp_upload_data_legacy
  epp_uploads:
    name: epp_uploads
