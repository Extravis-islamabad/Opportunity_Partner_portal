{% extends "base.html" %}
{% block content %}
<h2>{{ title }}</h2>
<p>Hello {{ name }},</p>
<div class="highlight">
    <p>{{ message }}</p>
</div>
{% if action_url %}
<div style="text-align: center;">
    <a href="{{ action_url }}" class="btn">{{ action_text | default("View Details") }}</a>
</div>
{% endif %}
{% endblock %}
